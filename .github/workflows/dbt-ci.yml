name: dbt CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dbt-postgres

      - name: Install dbt packages
        run: |
          dbt deps || true

      - name: Run dbt models
        run: |
          dbt run

      - name: Run dbt tests
        run: |
          dbt test
